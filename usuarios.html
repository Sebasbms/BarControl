<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Control de Barra</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <nav class="sidebar">
        <h2>BAR CONTROL</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="productos.html">Productos</a>
        <a href="ventas.html">Ventas</a>
        <a href="movimientos.html">Movimientos</a>
        <a href="reportes.html" class="admin-only">Reportes</a>
        <a href="usuarios.html" class="active admin-only">Usuarios</a>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="window.logout()" class="logout-btn">Cerrar Sesión</button>
        </div>
    </nav>
    <main>
        <h1>Gestión de Usuarios</h1>
        
        <div class="card" style="margin-bottom: 30px;">
            <h3>Crear Nuevo Usuario</h3>
            <form id="form-usuario" onsubmit="window.createNewUser(event)">
                <div class="dashboard-grid">
                    <div class="form-group">
                        <input type="text" id="new_username" placeholder="Nombre de Usuario (ej: barra1)" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <input type="password" id="new_password" placeholder="Contraseña (mín. 6 caracteres)" required minlength="6">
                    </div>
                    <div class="form-group">
                        <select id="new_role" required>
                            <option value="" disabled selected>-- Seleccionar Rol --</option>
                            <option value="Cajero">Cajero (Solo ventas)</option>
                            <option value="Administrador">Administrador (Acceso total)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Crear Usuario</button>
            </form>
        </div>

        <h3>Usuarios Registrados</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Dominio Interno</th>
                    </tr>
                </thead>
                <tbody id="usuarios-tbody">
                    <tr><td colspan="3" style="text-align: center;">Cargando usuarios...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
