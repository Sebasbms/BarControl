<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Venta Rápida - Control de Barra</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <nav class="sidebar">
        <h2>BAR CONTROL</h2>
        <a href="dashboard.html" class="admin-only">Resumen</a>
        <a href="productos.html" class="admin-only">Artículos</a>
        <a href="ventas.html" class="active">Venta Rápida</a>
        <a href="movimientos.html">Movimientos</a>
        <a href="reportes.html" class="admin-only">Reportes</a>
        <a href="usuarios.html" class="admin-only">Usuarios</a>
        <button onclick="window.logout()" class="logout-btn">Salir</button>
    </nav>

    <main>
        <div style="background-color: var(--bg-color); padding: 12px 12px 0 12px;">
            <div class="form-group" style="margin-bottom: 8px;">
                <input type="text" id="pos_search" placeholder="🔍 Buscar artículo o promoción..." oninput="window.filterPOSItems()" autocomplete="off">
            </div>
            <div class="categories-bar" id="pos_categories_bar">
                </div>
        </div>

        <div class="main-scroll">
            <div class="articulos-grid" id="pos_grid">
                </div>
        </div>

        <div class="carrito-flotante">
            <div class="carrito-summary">
                <div>
                    <span id="carrito-count">0 ítems seleccionados</span>
                </div>
                <div>
                    <h2 id="carrito-total">$0</h2>
                </div>
            </div>
            <div class="carrito-actions">
                <select id="pos_metodo_pago" class="pay-mode-select">
                    <option value="Efectivo">💵 Efectivo</option>
                    <option value="Transferencia">📱 Transferencia</option>
                </select>
                <button onclick="window.checkoutPOS()" class="btn-cobrar">Cobrar</button>
            </div>
        </div>
    </main>
</body>
</html>
