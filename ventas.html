<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Control de Barra</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <nav class="sidebar">
        <h2>BAR CONTROL</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="productos.html">Productos</a>
        <a href="ventas.html" class="active">Ventas</a>
        <a href="movimientos.html">Movimientos</a>
        <a href="reportes.html" class="admin-only">Reportes</a>
        <a href="usuarios.html" class="admin-only">Usuarios</a>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="window.logout()" class="logout-btn">Cerrar Sesión</button>
        </div>
    </nav>
    <main>
        <h1>Registrar Venta</h1>
        <div class="card">
            <form id="form-venta" onsubmit="window.registerSale(event)">
                <div class="form-group">
                    <label>Producto</label>
                    <select id="producto_select" required>
                        <option value="">-- Selecciona un producto --</option>
                        </select>
                </div>
                <div class="form-group">
                    <label>Cantidad</label>
                    <input type="number" id="cantidad" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label>Método de Pago</label>
                    <select id="metodo_pago" required>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Confirmar Venta</button>
            </form>
        </div>
    </main>
</body>
</html>
