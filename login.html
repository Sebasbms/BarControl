<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Control de Barra</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 style="margin-bottom: 20px; color: var(--primary-color);">Acceso al Sistema</h2>
            <form id="login-form" onsubmit="window.login(event)">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Usuario (ej: admin o barra1)" required autocomplete="off">
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Ingresar</button>
            </form>
            <div class="dev-signature" style="margin-top: 20px; font-size: 0.8rem; color: var(--text-secondary);">
                Developed by SeBaS
            </div>
        </div>
    </div>
</body>
</html>
