<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Control de Barra</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <nav class="sidebar">
        <h2>BAR CONTROL</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="productos.html">Productos</a>
        <a href="ventas.html">Ventas</a>
        <a href="movimientos.html">Movimientos</a>
        <a href="reportes.html" class="active admin-only">Reportes</a>
        <a href="usuarios.html" class="admin-only">Usuarios</a>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="window.logout()" class="logout-btn">Cerrar Sesión</button>
        </div>
    </nav>
    <main>
        <h1>Reportes y Exportación</h1>
        <div class="card" style="margin-bottom: 20px;">
            <h3>Exportar Datos a Excel (CSV)</h3>
            <p style="color: var(--text-secondary); margin-bottom: 15px;">Descarga la información de tu base de datos para verla en Excel.</p>
            <button onclick="window.exportToCSV('ventas')" class="btn-primary" style="margin-right: 10px;">Exportar Ventas</button>
            <button onclick="window.exportToCSV('productos')" class="btn-primary" style="margin-right: 10px;">Exportar Stock</button>
            <button onclick="window.exportToCSV('movimientos')" class="btn-primary">Exportar Movimientos</button>
        </div>
    </main>
</body>
</html>
