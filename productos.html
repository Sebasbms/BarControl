<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Control de Barra</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <nav class="sidebar">
        <h2>BAR CONTROL</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="productos.html" class="active">Productos</a>
        <a href="ventas.html">Ventas</a>
        <a href="movimientos.html">Movimientos</a>
        <a href="reportes.html" class="admin-only">Reportes</a>
        <a href="usuarios.html" class="admin-only">Usuarios</a>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="window.logout()" class="logout-btn">Cerrar Sesión</button>
        </div>
    </nav>
    <main>
        <h1>Gestión de Productos</h1>
        <div class="card admin-only" style="margin-bottom: 20px;">
            <h3>Nuevo Producto</h3>
            <form id="form-producto" onsubmit="window.saveProduct(event)">
                <div class="dashboard-grid">
                    <div class="form-group"><input type="text" id="nombre" placeholder="Nombre (ej. Quilmes 1L)" required></div>
                    <div class="form-group">
                        <select id="categoria" required>
                            <option value="Cerveza">Cerveza</option>
                            <option value="Vino">Vino</option>
                            <option value="Gaseosa">Gaseosa</option>
                            <option value="Aperitivos">Aperitivos</option>
                            <option value="Whisky">Whisky</option>
                            <option value="Vodka">Vodka</option>
                            <option value="Gin">Gin</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </div>
                    <div class="form-group"><input type="text" id="marca" placeholder="Marca" required></div>
                    <div class="form-group"><input type="number" id="precio_compra" placeholder="Precio Compra" required></div>
                    <div class="form-group"><input type="number" id="precio_venta" placeholder="Precio Venta" required></div>
                    <div class="form-group"><input type="number" id="stock" placeholder="Stock Inicial" required></div>
                    <div class="form-group"><input type="number" id="stock_minimo" placeholder="Stock Mínimo" required></div>
                    <div class="form-group"><input type="text" id="unidad" placeholder="Unidad (Botella, Lata, Medida)" required></div>
                </div>
                <button type="submit" class="btn-primary">Guardar Producto</button>
            </form>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Marca</th>
                        <th>Precio Venta</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="productos-tbody">
                    <tr><td colspan="6" style="text-align: center;">Cargando productos...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
