<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimientos - Control de Barra</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <nav class="sidebar">
        <h2>BAR CONTROL</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="productos.html">Productos</a>
        <a href="ventas.html">Ventas</a>
        <a href="movimientos.html" class="active">Movimientos</a>
        <a href="reportes.html" class="admin-only">Reportes</a>
        <a href="usuarios.html" class="admin-only">Usuarios</a>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="window.logout()" class="logout-btn">Cerrar Sesión</button>
        </div>
    </nav>
    <main>
        <h1>Historial de Movimientos</h1>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">Aquí se registrará todo: ventas, ingresos de mercadería y ajustes.</p>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Acción</th>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Observaciones</th>
                    </tr>
                </thead>
                <tbody id="movimientos-tbody">
                    <tr><td colspan="5" style="text-align: center;">Cargando movimientos...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
