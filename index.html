<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS de Barra</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>

    <nav class="sidebar">
        <h2 class="brand-title">BARRA POS</h2>
        <a href="#" id="tab-link-ventas" class="nav-btn active" onclick="window.switchTab('ventas')">⚡ Venta</a>
        <a href="#" id="tab-link-productos" class="nav-btn admin-only" onclick="window.switchTab('productos')">📦 Artículos</a>
        <a href="#" id="tab-link-dashboard" class="nav-btn admin-only" onclick="window.switchTab('dashboard')">📈 Resumen</a>
        <a href="#" id="tab-link-movimientos" class="nav-btn" onclick="window.switchTab('movimientos')">📋 Historial</a>
        <button onclick="window.logout()" class="logout-btn">Salir</button>
    </nav>

    <main>
        <section id="tab-ventas" class="app-tab active">
            <div class="pos-header">
                <div class="form-group" style="margin-bottom: 8px;">
                    <input type="text" id="pos_search" placeholder="🔍 Buscar artículo..." oninput="window.filterPOSItems()" autocomplete="off">
                </div>
                <div class="categories-bar" id="pos_categories_bar"></div>
            </div>

            <div class="tab-content-scroll">
                <div class="articulos-grid" id="pos_grid"></div>
            </div>

            <div class="carrito-flotante">
                <div class="carrito-summary">
                    <span id="carrito-count">0 ítems listos</span>
                    <h2 id="carrito-total">$0</h2>
                </div>
                <div class="carrito-actions">
                    <select id="pos_metodo_pago" class="pay-mode-select">
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Transferencia">📱 Transf.</option>
                    </select>
                    <button onclick="window.checkoutPOS()" class="btn-cobrar">Cobrar</button>
                </div>
            </div>
        </section>

        <section id="tab-productos" class="app-tab">
            <div class="tab-content-scroll" style="padding: 16px;">
                <h1 style="font-size: 1.4rem;">Artículos y Promos</h1>
                <div class="card" style="margin-bottom: 16px;">
                    <h3>+ Crear Categoría</h3>
                    <form id="form-categoria" onsubmit="window.saveCategory(event)" style="display: flex; gap: 8px; margin-top: 8px;">
                        <input type="text" id="new_category_name" placeholder="Ej: Cervezas" required autocomplete="off">
                        <button type="submit" class="btn-primary" style="width: auto;">Agregar</button>
                    </form>
                </div>

                <div class="card" style="margin-bottom: 24px;">
                    <h3>Registrar Artículo</h3>
                    <form id="form-producto" onsubmit="window.saveProduct(event)" style="margin-top: 10px;">
                        <div class="form-group"><label>Nombre</label><input type="text" id="nombre" placeholder="Ej: Quilmes 1L" required autocomplete="off"></div>
                        <div class="form-group"><label>Categoría</label><select id="categoria" required></select></div>
                        <div class="form-group"><label>Presentación</label><input type="text" id="marca" placeholder="Ej: Botella" required autocomplete="off"></div>
                        <div class="form-group"><label>Precio Venta ($)</label><input type="number" id="precio_venta" required></div>
                        <div class="form-group"><label>Stock</label><input type="number" id="stock" required></div>
                        <div class="form-group">
                            <label>Tipo</label>
                            <select id="tipo_articulo">
                                <option value="Normal">Normal</option>
                                <option value="Promo">Promo/Combo</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary" style="margin-top: 8px;">Guardar</button>
                    </form>
                </div>

                <h3>Inventario</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Acción</th></tr>
                        </thead>
                        <tbody id="productos-tbody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-dashboard" class="app-tab">
            <div class="tab-content-scroll" style="padding: 16px;">
                <h1 style="font-size: 1.4rem;">Caja General</h1>
                <div class="card" style="margin-bottom: 16px; border-left: 4px solid var(--primary-color);">
                    <p>Artículos Vendidos</p>
                    <h2 id="ventas-dia" style="font-size: 1.8rem; color: var(--primary-color);">0</h2>
                </div>
                <div class="card" style="margin-bottom: 16px; border-left: 4px solid var(--success-color);">
                    <p>Efectivo</p>
                    <h2 id="rec-efectivo" style="font-size: 1.8rem; color: var(--success-color);">$0</h2>
                </div>
                <div class="card" style="margin-bottom: 16px; border-left: 4px solid #a855f7;">
                    <p>Transferencias</p>
                    <h2 id="rec-transf" style="font-size: 1.8rem; color: #a855f7;">$0</h2>
                </div>
            </div>
        </section>

        <section id="tab-movimientos" class="app-tab">
            <div class="tab-content-scroll" style="padding: 16px;">
                <h1 style="font-size: 1.4rem;">Auditoría</h1>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr><th>Hora</th><th>Acción</th><th>Artículo</th><th>Cant.</th></tr>
                        </thead>
                        <tbody id="movimientos-tbody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
